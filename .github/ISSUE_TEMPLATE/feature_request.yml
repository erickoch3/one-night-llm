name: Feature request
description: Propose a focused game, agent, or developer-experience improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What player or contributor need would this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior, not only the implementation.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Information-boundary impact
      description: Could this affect role secrecy, session isolation, tool validation, or network access?
