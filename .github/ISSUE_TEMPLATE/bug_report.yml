name: Bug report
description: Report a reproducible problem in the game or development workflow.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem. Do not include credentials, private role data from another player, or security vulnerabilities.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Start a game in ... mode
        2. Choose ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Agent mode
      options:
        - Rehearsal agents
        - Codex agents
        - Both
        - Not applicable
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node.js version and macOS version; omit hostnames, usernames, and personal paths.
      placeholder: Node.js 22.13.0, macOS 15
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove tokens, emails, usernames, absolute paths, and other private data before pasting.
      render: shell
